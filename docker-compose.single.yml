version: '3.8'

services:
  biodockify:
    build:
      context: .
      dockerfile: Dockerfile.student
    ports:
      - "8000:8000"
    volumes:
      - biodockify-data:/app/backend/storage
    environment:
      - AI_MODE=auto
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - OLLAMA_TIMEOUT=120

volumes:
  biodockify-data:
