version: '3.8'

services:
  biodockify:
    build:
      context: .
      dockerfile: Dockerfile.single
    ports:
      - "8000:8000"
    volumes:
      - biodockify-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  biodockify-data:
