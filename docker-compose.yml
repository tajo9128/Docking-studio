# BioDockify Studio AI v2.4.0 - Microservices Architecture
# One-command startup: docker compose up
# Access via: http://localhost:8000

services:
  # =========================================================
  # Ollama - Local LLM Service
  # =========================================================
  ollama:
    image: ollama/ollama:latest
    container_name: docking-ollama
    hostname: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - docking-network

  # =========================================================
  # Gateway - Nginx reverse proxy + React UI
  # =========================================================
  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    container_name: docking-gateway
    hostname: gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      api-backend:
        condition: service_healthy
      brain-service:
        condition: service_healthy
    networks:
      - docking-network

  # =========================================================
  # Ollama Init - Auto-pull default model on first start
  # =========================================================
  ollama-init:
    image: ollama/ollama:latest
    container_name: docking-ollama-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama to be ready..."
        MODEL=${OLLAMA_MODEL:-qwen3:4b}
        echo "Pulling model: $MODEL"
        OLLAMA_HOST=http://ollama:11434 ollama pull $MODEL
        echo "Model $MODEL is ready."
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:4b}
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - docking-network
    restart: "no"

  # =========================================================
  # Brain Service - Nanobot AI Brain (Strategist)
  # =========================================================
  brain-service:
    build:
      context: ./services/brain-service
      dockerfile: Dockerfile
    image: biodockify/brain-service:latest
    container_name: docking-brain
    hostname: brain-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
      - API_BACKEND_URL=http://api-backend:8000
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:4b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # API Backend - Main FastAPI gateway
  # =========================================================
  api-backend:
    build:
      context: ./services/api-backend
      dockerfile: Dockerfile
    image: biodockify/api-backend:latest
    container_name: docking-api
    hostname: api-backend
    restart: unless-stopped
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
      - BRAIN_SERVICE_URL=http://brain-service:8000
      - DOCKING_SERVICE_URL=http://docking-service:8000
      - RDKIT_SERVICE_URL=http://rdkit-service:8000
      - PHARMACOPHORE_SERVICE_URL=http://pharmacophore-service:8000
      - QSAR_SERVICE_URL=http://qsar-service:8000
      - MD_SERVICE_URL=http://md-service:8000
      - SENTINEL_SERVICE_URL=http://sentinel-service:8000
      - ANALYSIS_SERVICE_URL=http://analysis-service:8000
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:4b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # Docking Service - AutoDock Vina execution
  # =========================================================
  docking-service:
    build:
      context: ./services/docking-service
      dockerfile: Dockerfile
    image: biodockify/docking-service:latest
    container_name: docking-vina
    hostname: docking-service
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
      - vina-cache:/root/.autodock_vina
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - docking-network

  # =========================================================
  # RDKit Service - Molecule processing
  # =========================================================
  rdkit-service:
    build:
      context: ./services/rdkit-service
      dockerfile: Dockerfile
    image: biodockify/rdkit-service:latest
    container_name: docking-rdkit
    hostname: rdkit-service
    restart: unless-stopped
    ports:
      - "8003:8000"
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # Pharmacophore Service - Pharmacophore modeling
  # =========================================================
  pharmacophore-service:
    build:
      context: ./services/pharmacophore-service
      dockerfile: Dockerfile
    image: biodockify/pharmacophore-service:latest
    container_name: docking-pharmacophore
    hostname: pharmacophore-service
    restart: unless-stopped
    ports:
      - "8004:8000"
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # QSAR Service - ML-based QSAR modeling
  # =========================================================
  qsar-service:
    build:
      context: ./services/qsar-service
      dockerfile: Dockerfile
    image: biodockify/qsar-service:latest
    container_name: docking-qsar
    hostname: qsar-service
    restart: unless-stopped
    ports:
      - "8005:8000"
    volumes:
      - storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # MD Service - Molecular Dynamics simulation (OpenMM + MD-Suite)
  # =========================================================
  md-service:
    build:
      context: ./services/md-service
      dockerfile: Dockerfile
    image: biodockify/md-service:latest
    container_name: docking-md
    hostname: md-service
    restart: unless-stopped
    ports:
      - "8006:8000"
    volumes:
      - storage:/app/storage/md
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - API_BACKEND_URL=http://api-backend:8000
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - EMAIL_SMTP_HOST=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - WHATSAPP_BRIDGE_URL=${WHATSAPP_BRIDGE_URL:-}
      - WHATSAPP_BRIDGE_TOKEN=${WHATSAPP_BRIDGE_TOKEN:-}
      - WHATSAPP_DEFAULT_TARGET=${WHATSAPP_DEFAULT_TARGET:-}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_DEFAULT_OPEN_ID=${FEISHU_DEFAULT_OPEN_ID:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - docking-network

  # =========================================================
  # Sentinel Service - Job Supervisor (monitor, retry, validate, escalate)
  # =========================================================
  sentinel-service:
    build:
      context: ./services/sentinel-service
      dockerfile: Dockerfile
    image: biodockify/sentinel-service:latest
    container_name: docking-sentinel
    hostname: sentinel-service
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - SENTINEL_POLL_INTERVAL=30
      - SENTINEL_JOB_TIMEOUT=3600
      - SENTINEL_MAX_RETRIES=3
      - DOCKING_SERVICE_URL=http://docking-service:8000
      - MD_SERVICE_URL=http://md-service:8000
      - QSAR_SERVICE_URL=http://qsar-service:8000
      - PHARMACOPHORE_SERVICE_URL=http://pharmacophore-service:8000
      - API_BACKEND_URL=http://api-backend:8000
    depends_on:
      redis:
        condition: service_healthy
      api-backend:
        condition: service_healthy
      docking-service:
        condition: service_healthy
      md-service:
        condition: service_healthy
      qsar-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - docking-network

  # =========================================================
  # Analysis Service - Insight Generator (ranking, consensus, ADMET)
  # =========================================================
  analysis-service:
    build:
      context: ./services/analysis-service
      dockerfile: Dockerfile
    image: biodockify/analysis-service:latest
    container_name: docking-analysis
    hostname: analysis-service
    restart: unless-stopped
    ports:
      - "8008:8000"
    volumes:
      - storage:/app/storage/analysis
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # Redis - Job queue broker
  # =========================================================
  redis:
    image: redis:7-alpine
    container_name: docking-redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - docking-network

  # =========================================================
  # PostgreSQL - Metadata storage
  # =========================================================
  postgres:
    image: postgres:15-alpine
    container_name: docking-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_USER=dockuser
      - POSTGRES_PASSWORD=dockpass
      - POSTGRES_DB=docking
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockuser -d docking"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - docking-network

  # =========================================================
  # Redis Worker - Background job processor
  # =========================================================
  redis-worker:
    build:
      context: ./services/redis-worker
      dockerfile: Dockerfile
    image: biodockify/redis-worker:latest
    container_name: docking-worker
    hostname: redis-worker
    restart: unless-stopped
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
      - AI_MODE=autonomous
      - DOCKING_SERVICE_URL=http://docking-service:8000
      - RDKIT_SERVICE_URL=http://rdkit-service:8000
      - PHARMACOPHORE_SERVICE_URL=http://pharmacophore-service:8000
      - MD_SERVICE_URL=http://md-service:8000
      - ANALYSIS_SERVICE_URL=http://analysis-service:8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      docking-service:
        condition: service_healthy
      pharmacophore-service:
        condition: service_healthy
      md-service:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network



# =========================================================
# Volumes - Persistent data
# =========================================================
volumes:
  storage:
    driver: local
  uploads:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  vina-cache:
    driver: local
  ollama-data:
    driver: local

networks:
  docking-network:
    name: docking-network
    driver: bridge
