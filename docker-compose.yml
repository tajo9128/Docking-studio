# Docking Studio v2.0 - Microservices Architecture
# One-command startup: docker compose up
# Access via: http://localhost:8000

services:
  # =========================================================
  # Gateway - Nginx reverse proxy + React UI
  # =========================================================
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: docking-gateway
    hostname: gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      api-backend:
        condition: service_healthy
      brain-service:
        condition: service_healthy
    networks:
      - docking-network

  # =========================================================
  # API Backend - Main FastAPI gateway
  # =========================================================
  api-backend:
    build:
      context: ./services/api-backend
      dockerfile: Dockerfile
    image: biodockify/api-backend:latest
    container_name: docking-api
    hostname: api-backend
    restart: unless-stopped
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
      - BRAIN_SERVICE_URL=http://brain-service:8001
      - DOCKING_SERVICE_URL=http://docking-service:8002
      - RDKIT_SERVICE_URL=http://rdkit-service:8003
      - PHARMACOPHORE_SERVICE_URL=http://pharmacophore-service:8004
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # Brain Service - Nanobot AI Agent
  # =========================================================
  brain-service:
    build:
      context: ./services/brain-service
      dockerfile: Dockerfile
    image: biodockify/brain-service:latest
    container_name: docking-brain
    hostname: brain-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
        - REDIS_URL=redis://redis:6379
        - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
        - AI_MODE=autonomous
        - DOCKING_SERVICE_URL=http://docking-service:8002
        - RDKIT_SERVICE_URL=http://rdkit-service:8003
      - PHARMACOPHORE_SERVICE_URL=http://pharmacophore-service:8004
      - QSAR_SERVICE_URL=http://qsar-service:8005
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # Docking Service - AutoDock Vina execution
  # =========================================================
  docking-service:
    build:
      context: ./services/docking-service
      dockerfile: Dockerfile
    image: biodockify/docking-service:latest
    container_name: docking-vina
    hostname: docking-service
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
      - vina-cache:/root/.autodock_vina
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # RDKit Service - Molecule processing
  # =========================================================
  rdkit-service:
    build:
      context: ./services/rdkit-service
      dockerfile: Dockerfile
    image: biodockify/rdkit-service:latest
    container_name: docking-rdkit
    hostname: rdkit-service
    restart: unless-stopped
    ports:
      - "8003:8000"
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # Pharmacophore Service - Pharmacophore modeling
  # =========================================================
  pharmacophore-service:
    build:
      context: ./services/pharmacophore-service
      dockerfile: Dockerfile
    image: biodockify/pharmacophore-service:latest
    container_name: docking-pharmacophore
    hostname: pharmacophore-service
    restart: unless-stopped
    ports:
      - "8004:8000"
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # QSAR Service - ML-based QSAR modeling
  # =========================================================
  qsar-service:
    build:
      context: ./services/qsar-service
      dockerfile: Dockerfile
    image: biodockify/qsar-service:latest
    container_name: docking-qsar
    hostname: qsar-service
    restart: unless-stopped
    ports:
      - "8005:8000"
    volumes:
      - storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    networks:
      - docking-network

  # =========================================================
  # Redis - Job queue broker
  # =========================================================
  redis:
    image: redis:7-alpine
    container_name: docking-redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - docking-network

  # =========================================================
  # PostgreSQL - Metadata storage
  # =========================================================
  postgres:
    image: postgres:15-alpine
    container_name: docking-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_USER=dockuser
      - POSTGRES_PASSWORD=dockpass
      - POSTGRES_DB=docking
      - PGDATA=/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockuser -d docking"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - docking-network

  # =========================================================
  # Redis Worker - Background job processor
  # =========================================================
  redis-worker:
    build:
      context: ./services/redis-worker
      dockerfile: Dockerfile
    image: biodockify/redis-worker:latest
    container_name: docking-worker
    hostname: redis-worker
    restart: unless-stopped
    volumes:
      - storage:/app/storage
      - uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://dockuser:dockpass@postgres:5432/docking
      - AI_MODE=autonomous
      - DOCKING_SERVICE_URL=http://docking-service:8002
      - RDKIT_SERVICE_URL=http://rdkit-service:8003
      - PHARMACOPHORE_SERVICE_URL=http://pharmacophore-service:8004
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      docking-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
    networks:
      - docking-network



# =========================================================
# Volumes - Persistent data
# =========================================================
volumes:
  storage:
    driver: local
  uploads:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  vina-cache:
    driver: local

networks:
  docking-network:
    name: docking-network
    driver: bridge
