services:
  # =========================================================
  # Ollama - Optional AI Assistant
  # Works fully without this. Uncomment if you want AI features.
  # =========================================================
  ollama:
    image: ollama/ollama:latest
    container_name: docking-ollama
    hostname: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models
    volumes:
      - ollama-models:/models
    # Uncomment below to enable GPU (requires NVIDIA GPU + nvidia-docker)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - docking-network

  # =========================================================
  # Docking Studio Backend - Main Application
  # =========================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: biodockify/docking-studio:latest
    container_name: docking-backend
    hostname: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./uploads:/uploads
      - ./backend/storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - AI_MODE=auto
      - OLLAMA_MODEL=llama3
      - OLLAMA_URL=http://ollama:11434
      - ALLOW_AI=true
    # Ollama is optional - no depends_on so backend starts even if Ollama is absent
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - docking-network

volumes:
  data:
  uploads:
  ollama-models:

networks:
  docking-network:
    name: docking-network
    driver: bridge
