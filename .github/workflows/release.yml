name: Build and Release with Installer

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          echo "=== DEPENDENCIES INSTALLED ==="
          pip list

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          echo "=== FRONTEND BUILD COMPLETE ==="

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller build_windows.spec --clean --noconfirm
          echo "=== PYINSTALLER BUILD COMPLETE ==="
          Get-ChildItem dist -Recurse | Select-Object FullName, Length

      - name: Generate Checksums
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter "BioDockify.exe" -Recurse | Select-Object -First 1
          if ($exe) {
            $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash $($exe.Name)" | Out-File -FilePath dist\checksums.txt -Encoding ascii
            Write-Host "Checksum: $hash - $($exe.Name)"
          }

      - name: Display build artifacts
        run: |
          echo "=== BUILD ARTIFACTS ==="
          Get-ChildItem dist -Recurse | Select-Object FullName

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/BioDockify/BioDockify.exe
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
