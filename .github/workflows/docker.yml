name: Build and Push Student Docker Image

on:
  push:
    branches:
      - v1-student-edition
    tags:
      - 'v*-student'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
       
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
       
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tajo9128
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Student Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.student
          push: true
          tags: |
            tajo9128/biodockify-studio-ai:student-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Show pushed tags
        run: |
          echo "Docker image pushed:"
          echo "  tajo9128/biodockify-studio-ai:student-latest"
